<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview — Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #c8f04f;
      --text: #e8e8f0;
      --text-muted: #5a5a7a;
      --danger: #ff5f5f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,240,79,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,240,79,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      animation: fadeUp 0.5s ease both;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
    }

    /* Custom file input */
    .file-label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--bg);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      cursor: pointer;
      transition: border-color 0.2s;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .file-label:hover { border-color: var(--accent); color: var(--text); }

    .file-label .icon {
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    input[type="file"] { display: none; }

    #file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    button[type="submit"]:hover { background: #d8ff5a; transform: translateY(-1px); }
    button[type="submit"]:active { transform: translateY(0); }

    @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">AI Interview</div>
  <h1>Let's get<br/>you ready.</h1>
  <p class="subtitle">Upload your resume and tell us your target role.<br/>We'll generate a personalised interview for you.</p>

  <!--
    ACTION points to your Express route.
    After saving to DB the route should redirect to:
      /interview?id=<newEntry._id>
  -->
  <form action="/entry" method="POST" enctype="multipart/form-data">

    <div class="field">
      <label>Resume (PDF)</label>
      <label class="file-label" for="resume-input">
        <span class="icon">📄</span>
        <span id="file-name">Click to upload PDF…</span>
      </label>
      <input
        type="file"
        id="resume-input"
        name="resume"
        accept=".pdf,.docx"
        required
        onchange="document.getElementById('file-name').textContent = this.files[0]?.name || 'Click to upload PDF…'"
      />
    </div>

    <div class="field">
      <label>Years of Experience</label>
      <!-- the name u use here is same attribute u will use to call the details  -->
      <input type="number" name="yoe" placeholder="e.g. 2" min="0" max="40" required />
    </div>

    <div class="field">
      <label>Target Role</label>
      <input type="text" name="target_role" placeholder="e.g. Backend Engineer" required />
    </div>

    <div class="field">
      <label>Target Company</label>
      <input type="text" name="target_company" placeholder="e.g. Google" required />
    </div>

    <button type="submit">Start Interview →</button>

  </form>
</div>

</body>
</html>
