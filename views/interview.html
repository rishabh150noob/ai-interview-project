<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #c8f04f;
      --text: #e8e8f0;
      --text-muted: #171735;
      --danger: #a75f5f;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,240,79,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,240,79,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.2rem;
      animation: fadeDown 0.6s ease both;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .progress-pill {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
    }

    #q-counter { color: var(--accent); }

    .interviewer-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .interviewer-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(200,240,79,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .interviewer-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .interviewer-label::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    #question-text {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.6;
      color: var(--text);
      min-height: 3.5rem;
    }

    #question-text.loading::after {
      content: '|';
      animation: blink 0.7s step-end infinite;
      color: var(--accent);
    }

    .wave-bar {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 32px;
      margin-top: 1.5rem;
    }

    .wave-bar span {
      display: block;
      width: 3px;
      background: var(--accent);
      border-radius: 2px;
      opacity: 0.4;
      transition: height 0.1s ease;
    }

    .wave-bar.speaking span {
      opacity: 1;
      animation: wave 0.8s ease-in-out infinite alternate;
    }

    .wave-bar.speaking span:nth-child(1) { animation-delay: 0.00s; }
    .wave-bar.speaking span:nth-child(2) { animation-delay: 0.10s; }
    .wave-bar.speaking span:nth-child(3) { animation-delay: 0.20s; }
    .wave-bar.speaking span:nth-child(4) { animation-delay: 0.15s; }
    .wave-bar.speaking span:nth-child(5) { animation-delay: 0.05s; }
    .wave-bar.speaking span:nth-child(6) { animation-delay: 0.25s; }
    .wave-bar.speaking span:nth-child(7) { animation-delay: 0.10s; }
    .wave-bar.speaking span:nth-child(8) { animation-delay: 0.20s; }

    .transcript-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.6rem 2rem;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    .transcript-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    #transcript-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      min-height: 2rem;
      font-style: italic;
      transition: color 0.3s ease;
    }

    #transcript-text.active { color: var(--text); font-style: normal; }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      animation: fadeUp 0.5s 0.3s ease both;
    }

    .btn-record {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 1rem 1.5rem;
      background: transparent;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      border-radius: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-record:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-record.recording {
      border-color: var(--danger);
      color: var(--danger);
      animation: recordPulse 1.5s infinite;
    }

    .btn-record .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .btn-record.recording .dot { animation: blink 0.7s step-end infinite; }

    .btn-submit {
      padding: 1rem 1.8rem;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .btn-submit:hover { background: #d8ff5a; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      animation: fadeUp 0.5s 0.35s ease both;
    }

    #status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    #status-dot.active   { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    #status-dot.recording { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: blink 0.7s step-end infinite; }

    /* Feedback overlay */
    .feedback-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.96);
      z-index: 100;
      overflow-y: auto;
      padding: 3rem 1.5rem;
      animation: fadeIn 0.4s ease;
    }

    .feedback-overlay.show { display: block; }

    .feedback-inner {
      max-width: 720px;
      margin: 0 auto;
    }

    .feedback-title {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    .feedback-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .feedback-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      font-size: 0.88rem;
      line-height: 1.9;
      white-space: pre-wrap;
    }

    .feedback-close {
      margin-top: 2rem;
      padding: 0.9rem 2rem;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .feedback-close:hover { background: #d8ff5a; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    .spinner.show { display: inline-block; }

    @keyframes fadeDown  { from { opacity:0; transform: translateY(-12px); } to { opacity:1; transform: translateY(0); } }
    @keyframes fadeUp    { from { opacity:0; transform: translateY(16px); }  to { opacity:1; transform: translateY(0); } }
    @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
    @keyframes blink     { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes pulse     { 0%,100% { box-shadow: 0 0 4px var(--accent); } 50% { box-shadow: 0 0 12px var(--accent); } }
    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes recordPulse { 0%,100% { box-shadow: 0 0 0 rgba(255,95,95,0); } 50% { box-shadow: 0 0 16px rgba(255,95,95,0.3); } }
    @keyframes wave      { from { height: 4px; } to { height: 24px; } }
  </style>
</head>
<body>


<div class="container">

  <div class="header">
    <div class="brand">AI Interview</div>
    <div class="progress-pill">Question <span id="q-counter">1</span></div>
  </div>

  <div class="interviewer-card">
    <div class="interviewer-label">Interviewer</div>
    <div id="question-text" class="loading">Loading your first question…</div>
    <div class="wave-bar" id="wave">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="transcript-card">
    <div class="transcript-label">Your Answer</div>
    <div id="transcript-text">Speak your answer naturally…</div>
  </div>

  <div class="controls">
    <button class="btn-submit" id="btn-start-call" onclick="startVapiInterview()" disabled>
      Start Interview
    </button>
    <button class="btn-record" id="btn-end-call" onclick="endVapiInterview()" disabled>
      <span class="dot"></span> End Interview
    </button>
  </div>

  <div class="status-bar">
    <span id="status-dot"></span>
    <div class="spinner" id="spinner"></div>
    <span id="status-msg">Initialising…</span>
  </div>

</div>

<!-- Feedback Overlay -->
<div class="feedback-overlay" id="feedback-overlay">
  <div class="feedback-inner">
    <div class="feedback-title">Interview Report</div>
    <div class="feedback-subtitle">Generated by AI evaluator</div>
    <div class="feedback-body" id="feedback-body">Generating your report…</div>
    <button class="feedback-close" onclick="document.getElementById('feedback-overlay').classList.remove('show')">
      Close
    </button>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js" ></script>
<script src="/interview.js" defer></script>
</body>
</html>
